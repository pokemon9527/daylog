services:
  postgres:
    image: docker.1ms.run/library/postgres:16-alpine
    container_name: daylog-postgres
    environment:
      POSTGRES_USER: daylog
      POSTGRES_PASSWORD: daylog123
      POSTGRES_DB: daylog
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_init.up.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daylog"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - daylog-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: daylog-backend
    environment:
      SERVER_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: daylog
      DB_PASSWORD: daylog123
      DB_NAME: daylog
      DB_SSLMODE: disable
      JWT_SECRET: daylog-secret-key-change-in-production
      UPLOAD_PATH: ./uploads
    ports:
      - "8080:8080"
    volumes:
      - backend-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/auth/register || true"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - daylog-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: daylog-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - daylog-net

volumes:
  pgdata:
  backend-uploads:

networks:
  daylog-net:
    driver: bridge
